What it is

- For every input there's an output

--

- Deterministic

--

## Good or Bad?
---

```python
def foo(x: int) -> None:
  logger.info("adding")

  return x + 1
```

???
- We can usually ignore the side-effect of producing logs
- We call such side-effects "benign effects"
- Since it's invisible to the application code, and no logic or decision depends on it
- But sometimes logs are part of the product too, and we want to verify them
- In these cases it's worthwhile treating logs as side-effects that we need to keep away from pure functions

---

```python
cache = {}

def foo(x: int) -> int:
    if x not in cache:
        cache[x] = x * 2

    return cache[x]
```

???
- This breaks the rules by mutating a dictionary
- But whether this is observable or not depends on how you use the cache

## The Functional Subset of Python
---

???

- Like any good paradigm it is defined more by what it subtracts from our lives rather than what it adds
- Just like one of OOPs most notable features is hiding away information
- So there are limitations that functional programming puts on the code that we can write

---

- No value reassignment

???
- Initialize values when you declare them

--

- No `self` mutation
--

  - Prefer `Final` fields
--

- No IO
--

  - No web calls
  - No system calls
  - No environment fetching
  - No ...

---

- Favor immutability

???
- Being immutable is very liberating
- Probably the biggest single step you can take towards functional programming
- You no longer have to worry about sharing data
- No need to do defensive copying
- Once you have a value you know it's "done", nothing else can happen to it
- You don't have to look around to figure out who and when initialized it
- Just follow the call chain
- No invariants to be broken
--

- `dataclass(frozen=True)`

--

- Prefer `Sequence`, `FrozenSet`, `Mapping`, ...

--

- If you want to mutate, create a modified copy

---

- Pretend `list` and `dict` are immutable

???
- `list` and `dict` are mutable and we would rather avoid them
- But they are ubiquitous and hard to avoid
- So we can pretend they are immutable
- If we don't trust their source, make a defensive copy

--

  - `a + b`  
  `a.append(b)`
--

  - `sorted(a)`  
  `a.sort()`
--

  - `a | b`  
  `a |= b`
--

  - `a | {"foo": 1}`  
  `a["foo"] = 1`

--
- "Although practicality beats purity"
---

What's left:
--

- Conditional logic
--

- Building up data

--

- Destructuring data

--

- Can't avoid some friction

```python
def map[E, A, B](
  result: Result[E, A],
  f: Callable[[A], B]) -> Result[E, B]
```

???
- This is the first time we are using higher-order functions
- Probably the most recognizable trait of functional programming
- And a great tool to reduce code repetition
---

```python
check_interval("...").map(build_config)

# Result[ConfigError, PromConfig]
```

???
- Notice what we are no longer dealing with
- We don't have to mention errors anywhere
- The code is focused on "the happy path"
- The other path is plumbed automatically by the `Result` type

```python
def combine3[E, A, B, C, D](
    r1: Result[Sequence[E], A],
    r2: Result[Sequence[E], B],
    r3: Result[Sequence[E], C],
    f: Callable[[A, B, C], D]
) -> Result[Sequence[E], D]:

```

???
- Follow the types to figure out what this is doing
- This look intimidating, and might feel like unnecessary plumbing
- But you implement it once and you get error accumulation everywhere
- Without having to implement some kind of custom logic for it

    global_config,
    alerting,
    scrape_jobs).using(combine_configs)
